<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>📖 My Book Tracker</title>
  </head>

  <body class="font-sans bg-[#F4F0E8] text-[#2F342E] min-h-screen">
    <header class="bg-[#8FA98C] text-[#F4F0E8] shadow-md">
      <div class="max-w-3xl mx-auto px-6 py-10">
        <h1 class="font-serif text-4xl text-[#F4F0E8] mb-6 tracking-wide">
          Dashboard
        </h1>

        <div id="search-bar" class="flex items-center gap-3 mb-6">
          <input
            type="search"
            id="book-search"
            name="book-search"
            placeholder="Search Book..."
            class="flex-1 bg-[#6F8670] text-[#F4F0E8] placeholder-[#D9E2D3] border border-[#A8B8A2] rounded-lg px-4 py-2 tsext-sm focus:outline-none focus:ring-2 focus:ring-[#F4F0E8]/60 transition"
          />
          <button
            class="btn search-btn bg-[#F4F0E8] text-[#2F342E] hover:bg-[#E9E3D8] rounded-lg px-4 py-2 text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-[#F4F0E8]/60"
            aria-label="Search"
          >
            Search
          </button>
        </div>

        <div id="new-book">
          <button
            class="btn add-btn bg-[#C38B74] hover:bg-[#B97B63] text-[#F4F0E8] rounded-lg px-5 py-2 text-sm font-bold tracking-wide transition focus:outline-none focus:ring-2 focus:ring-[#EADFD3]"
          >
            + Add New Book
          </button>

          <form
            id="new-book-form"
            class="hidden mt-6 bg-[#F4F0E8] text-[#2F342E] rounded-2xl p-6 shadow-lg border border-[#D9E2D3] max-w-md"
          >
            <h3 class="font-serif text-2xl text-[#2F342E] mb-5">
              Book Details
            </h3>

            <div class="mb-4">
              <label
                for="title"
                class="block text-xs font-bold uppercase tracking-widest text-[#6B7A6C] mb-1"
              >
                Title
              </label>
              <input
                type="text"
                name="title"
                id="title"
                class="w-full border border-[#D9E2D3] bg-[#F4F0E8] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#8FA98C] transition"
              />
            </div>

            <div class="mb-4">
              <label
                for="author"
                class="block text-xs font-bold uppercase tracking-widest text-[#6B7A6C] mb-1"
              >
                Author
              </label>
              <input
                type="text"
                name="author"
                id="author"
                class="w-full border border-[#D9E2D3] bg-[#F4F0E8] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#8FA98C] transition"
              />
            </div>

            <div class="mb-4">
              <label
                for="status"
                class="block text-xs font-bold uppercase tracking-widest text-[#6B7A6C] mb-1"
              >
                Status
              </label>
              <select
                name="status"
                id="status"
                class="w-full border border-[#D9E2D3] bg-[#F4F0E8] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#8FA98C] transition"
              >
                <option value="to-read">To Read</option>
                <option value="reading">Reading</option>
                <option value="read">Read</option>
              </select>
            </div>

            <div class="mb-6">
              <label
                class="block text-xs font-bold uppercase tracking-widest text-[#6B7A6C] mb-2"
              >
                Rating
              </label>

              <div class="rating flex justify-end gap-1">
                <span
                  data-value="1"
                  class="text-2xl cursor-pointer text-[#D9E2D3] hover:text-[#C38B74] transition select-none"
                  aria-label="1 star"
                  >★</span
                >
                <span
                  data-value="2"
                  class="text-2xl cursor-pointer text-[#D9E2D3] hover:text-[#C38B74] transition select-none"
                  aria-label="2 stars"
                  >★</span
                >
                <span
                  data-value="3"
                  class="text-2xl cursor-pointer text-[#D9E2D3] hover:text-[#C38B74] transition select-none"
                  aria-label="3 stars"
                  >★</span
                >
                <span
                  data-value="4"
                  class="text-2xl cursor-pointer text-[#D9E2D3] hover:text-[#C38B74] transition select-none"
                  aria-label="4 stars"
                  >★</span
                >
                <span
                  data-value="5"
                  class="text-2xl cursor-pointer text-[#D9E2D3] hover:text-[#C38B74] transition select-none"
                  aria-label="5 stars"
                  >★</span
                >
              </div>
            </div>

            <button
              type="submit"
              class="btn submit-btn w-full bg-[#8FA98C] hover:bg-[#7E947C] text-[#F4F0E8] rounded-lg px-5 py-2 text-sm font-bold tracking-wide transition focus:outline-none focus:ring-2 focus:ring-[#8FA98C]"
            >
              Save Book
            </button>
          </form>
        </div>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-10">
      <ul id="book-list" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></ul>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
